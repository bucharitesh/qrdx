name: Staging to Main PR

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch branches
        run: git fetch origin main staging

      - name: Generate PR title and body
        id: generate
        env:
          BASE_BRANCH: main
          HEAD_BRANCH: staging
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set +e
          node .github/scripts/generate-staging-pr-body.mjs
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 2 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No commits on staging ahead of main." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$exit_code" -ne 0 ]; then
            exit "$exit_code"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.generate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="$(cat pr-title.txt)"
          head="${{ github.repository_owner }}:staging"
          existing_pr="$(gh pr list --base main --head "$head" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "$title" --body-file pr-body.md
            echo "Updated PR #$existing_pr" >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr create --base main --head "$head" --title "$title" --body-file pr-body.md >> "$GITHUB_STEP_SUMMARY"
          fi
